<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Simple visual improvements */
        body{
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            background: linear-gradient(180deg,#f8fafc,#eef2ff);
            padding: 36px;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        #count{
            width:380px;
            max-width:90vw;
            padding:12px 14px;
            font-size:16px;
            border-radius:8px;
            border:1px solid #d1d5db;
            background:#fff;
            box-shadow:0 2px 6px rgba(15,23,42,0.04);
            transition:box-shadow .15s ease, border-color .15s ease;
        }
        #count:focus{outline:none; border-color:#3b82f6; box-shadow:0 6px 20px rgba(59,130,246,0.12)}
        .row{display:flex; align-items:center; gap:10px}
        #go{
            margin-left:0;
            padding:10px 14px;
            font-weight:600;
            background:#3b82f6;
            color:#fff;
            border:0;
            border-radius:8px;
            cursor:pointer;
        }
        #go:hover{filter:brightness(.95)}
        .result-card{margin-top:12px; color:#111827; font-size:15px; width:380px; max-width:90vw; padding:12px 14px; border-radius:10px; background:linear-gradient(180deg,#ffffff,#fbfdff); box-shadow:0 6px 18px rgba(2,6,23,0.06); display:flex; flex-direction:column; gap:6px}
        .result-card .label{font-size:12px; color:#6b7280}
        .result-card .value{font-size:20px; font-weight:700; color:#0f172a}
        .result-card.show{animation:fadeIn .18s ease both}
        @keyframes fadeIn{from{opacity:0; transform:translateY(-6px)} to{opacity:1; transform:none}}
    </style>
</head>
<body>
    <div class="controls">
        <div class="row">
            <input type="text" id="count">
            <button id="go">GO</button>
        </div>
        <div id="result" class="result-card" role="status" aria-live="polite" aria-atomic="true" hidden>
            <div class="label">Humidity</div>
            <div class="value">—</div>
        </div>
    </div>
</body>
<script>

    console.log(count.innerHTML);
    document.getElementById("go").addEventListener("click", async () => {
        var text = document.getElementById("count").value;
        // console.log(text);
        // let data = [{name:"Abdullah",city:"Ajmer"},{name:"Aleem",city:"Oshowa"}]
        // // let {name} = data[0];
        
        // console.log(data[0].name);
        let res = await fetch(`https://wttr.in/${text}?format=j1`);
        let data = await res.json();

        let {current_condition} = data;


        // let { current_condition, nearest_area } = data;
        // let temp = current_condition[0].temp_C;
        // console.log(data);
        // console.log(current_condition[0].humidity);
        const resultEl = document.getElementById('result');
        const valueEl = resultEl.querySelector('.value');
        valueEl.textContent = current_condition[0].humidity + '%';
        resultEl.hidden = false;
        // trigger animation
        resultEl.classList.remove('show');
        // force reflow then add
        void resultEl.offsetWidth;
        resultEl.classList.add('show');
    })
    
</script>
</html>
